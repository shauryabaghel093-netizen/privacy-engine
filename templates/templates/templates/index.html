<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Engine Elite</title>
    <style>
        :root { --blue: #38bdf8; --red: #ef4444; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 15px; transition: 0.5s; }
        .glass-card { background: var(--card); padding: 20px; border-radius: 18px; border: 1px solid #334155; margin-bottom: 20px; }
        
        /* 🛡️ Feature 1: Incognito Shield UI */
        .shield-toggle { display: flex; justify-content: space-between; align-items: center; background: rgba(56, 189, 248, 0.1); padding: 15px; border-radius: 12px; border: 1px solid var(--blue); }
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #475569; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--blue); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* 📊 Feature 2: AI Risk Progress Bars */
        .risk-bar-bg { background: #334155; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .risk-fill { height: 100%; transition: 1.5s ease-in-out; }

        /* 🔪 Feature 3: Kill Switch Buttons */
        .kill-btn { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red); color: var(--red); padding: 7px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .kill-btn:active { background: var(--red); color: white; }

        .scan-btn { background: var(--blue); color: #0f172a; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .incognito-mode { background: #020617 !important; box-shadow: inset 0 0 50px #ff0000; }
    </style>
</head>
<body id="mainBody">

    <div class="glass-card">
        <div class="shield-toggle">
            <div>
                <h3 style="margin:0; color:var(--blue);">🕵️ Privacy Shield</h3>
                <small id="shieldDesc">Mic, Cam & GPS Monitoring</small>
            </div>
            <label class="switch">
                <input type="checkbox" id="shieldBtn" onclick="activateShield()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="glass-card">
        <h2 style="margin:0;">🛡️ AI Engine v2.0</h2>
        <p>User: <b>{{ user }}</b> | Status: <b id="statusText" style="color:var(--blue);">SECURE</b></p>
        <button class="scan-btn" id="aiBtn" onclick="startAIScan()">🧠 START AI SCANNING</button>
    </div>

    <div class="glass-card">
        <h3 style="color:#94a3b8; margin-top:0;">📊 Threats & Activity Log</h3>
        {% for item in history %}
        <div style="margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:18px; font-weight:bold;">{{ item.app }}</span>
                <button class="kill-btn" onclick="killProcess('{{ item.app }}')">KILL PROCESS</button>
            </div>
            <div style="margin-top:8px;">
                <small>AI Risk Score: <b>{{ item.risk }}%</b> ({{ item.status }})</small>
                <div class="risk-bar-bg">
                    <div class="risk-fill" style="width:{{ item.risk }}%; background:{{ '#ef4444' if item.risk > 50 else '#4ade80' }};"></div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        function activateShield() {
            let chk = document.getElementById('shieldBtn').checked;
            let body = document.getElementById('mainBody');
            let desc = document.getElementById('shieldDesc');
            if(chk) {
                body.classList.add('incognito-mode');
                desc.innerText = "🛑 ALL SENSORS LOCKED";
                desc.style.color = "#ef4444";
                alert("Privacy Shield Active! Background access blocked.");
            } else {
                body.classList.remove('incognito-mode');
                desc.innerText = "Mic, Cam & GPS Monitoring";
                desc.style.color = "#94a3b8";
            }
        }

        function startAIScan() {
            let btn = document.getElementById('aiBtn');
            btn.innerText = "🤖 ANALYZING APP BEHAVIOR...";
            btn.style.background = "#f59e0b";
            setTimeout(() => {
                location.reload(); // Re-scans and updates risk scores
            }, 2500);
        }

        function killProcess(name) {
            if(confirm("Terminate " + name + " immediately?")) {
                alert("⚡ Done! " + name + " process has been killed.");
            }
        }
    </script>
</body>
</html>
